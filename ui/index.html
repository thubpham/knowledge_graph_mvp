<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Graph</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f11;
      color: #e2e2e5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }

    header {
      width: 100%;
      max-width: 820px;
      margin-bottom: 36px;
    }

    header h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: -0.02em; color: #fff; }
    header p  { margin-top: 4px; font-size: 0.85rem; color: #666; }

    .layout {
      width: 100%;
      max-width: 820px;
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 24px;
      align-items: start;
    }

    /* ── Left column ── */
    .main { display: flex; flex-direction: column; gap: 16px; }

    .search-box {
      display: flex;
      gap: 8px;
    }

    .search-box input {
      flex: 1;
      background: #1a1a1e;
      border: 1px solid #2e2e34;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 0.9rem;
      color: #e2e2e5;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-box input:focus { border-color: #6366f1; }
    .search-box input::placeholder { color: #444; }

    .search-box button {
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 11px 18px;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .search-box button:hover    { background: #4f52d9; }
    .search-box button:disabled { background: #2e2e3a; cursor: not-allowed; }

    .examples .chips { display: flex; flex-wrap: wrap; gap: 7px; }

    .chip {
      background: #1a1a1e;
      border: 1px solid #2a2a30;
      border-radius: 20px;
      padding: 4px 11px;
      font-size: 0.78rem;
      color: #888;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .chip:hover { border-color: #6366f1; color: #c7c7ff; }

    #status {
      font-size: 0.82rem;
      color: #666;
      min-height: 18px;
    }
    #status.error { color: #f87171; }

    #results { display: flex; flex-direction: column; gap: 10px; }

    .edge-card {
      background: #1a1a1e;
      border: 1px solid #2e2e34;
      border-radius: 10px;
      padding: 14px 16px;
    }

    .edge-card .fact {
      font-size: 0.9rem;
      color: #e2e2e5;
      line-height: 1.55;
    }

    .edge-card .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      margin-top: 8px;
    }

    .tag {
      font-size: 0.72rem;
      padding: 2px 7px;
      border-radius: 4px;
      font-family: monospace;
    }

    .tag.relation { background: #1e2040; color: #818cf8; border: 1px solid #3730a3; }
    .tag.entity   { background: #1a2a1a; color: #86efac; border: 1px solid #166534; }
    .tag.score    { background: #1a1a2e; color: #a5b4fc; border: 1px solid #3730a3; margin-left: auto; }

    .edge-card .dates {
      font-size: 0.7rem;
      color: #444;
      margin-top: 5px;
    }

    /* ── Error / debug box ── */
    .info-box {
      background: #13131a;
      border: 1px solid #2e2e34;
      border-radius: 10px;
      overflow: hidden;
    }

    .info-box summary {
      padding: 10px 14px;
      font-size: 0.8rem;
      color: #666;
      cursor: pointer;
      user-select: none;
      list-style: none;
    }
    .info-box summary::before { content: "▶ "; font-size: 0.65rem; }
    details[open] summary::before { content: "▼ "; }

    .info-box pre {
      padding: 0 14px 12px;
      font-size: 0.75rem;
      color: #777;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .suggestions { padding: 10px 14px 14px; display: flex; flex-wrap: wrap; gap: 6px; }
    .suggestions p { width: 100%; font-size: 0.78rem; color: #888; margin-bottom: 4px; }

    .sug-chip {
      background: #1e2040;
      border: 1px solid #3730a3;
      color: #818cf8;
      border-radius: 6px;
      padding: 3px 9px;
      font-size: 0.75rem;
      font-family: monospace;
      cursor: pointer;
      transition: background 0.12s;
    }
    .sug-chip:hover { background: #2a2d60; }

    .answer-box {
      background: #16161e;
      border: 1px solid #3730a3;
      border-radius: 10px;
      padding: 16px 18px;
      font-size: 0.92rem;
      line-height: 1.65;
      color: #c7c7ff;
    }

    .answer-box .answer-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6366f1;
      margin-bottom: 8px;
    }

    .empty {
      color: #444;
      font-size: 0.88rem;
      text-align: center;
      padding: 36px;
    }

    /* ── Right column: entity browser ── */
    .sidebar {
      background: #13131a;
      border: 1px solid #2e2e34;
      border-radius: 12px;
      overflow: hidden;
      position: sticky;
      top: 24px;
    }

    .sidebar-header {
      padding: 12px 14px 8px;
      font-size: 0.75rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid #1e1e24;
    }

    .sidebar-search {
      padding: 8px 10px;
      border-bottom: 1px solid #1e1e24;
    }

    .sidebar-search input {
      width: 100%;
      background: #1a1a1e;
      border: 1px solid #2a2a30;
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 0.78rem;
      color: #ccc;
      outline: none;
    }
    .sidebar-search input:focus { border-color: #6366f1; }

    #entity-list {
      max-height: 480px;
      overflow-y: auto;
      padding: 4px 0;
    }

    .entity-row {
      padding: 6px 14px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .entity-row:hover { background: #1e1e26; }

    .entity-row .ename {
      font-size: 0.82rem;
      color: #ccc;
    }

    .entity-row .eid {
      font-size: 0.7rem;
      color: #444;
      font-family: monospace;
    }

    .entity-count {
      padding: 6px 14px 10px;
      font-size: 0.7rem;
      color: #444;
      border-top: 1px solid #1e1e24;
    }

    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid #444;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 5px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>Knowledge Graph</h1>
  <p>Ask a natural-language question. Entities in the graph are listed on the right.</p>
</header>

<div class="layout">
  <!-- ── Main query panel ── -->
  <div class="main">

    <div class="search-box">
      <input id="q" type="text" placeholder="What do I know about..." autofocus />
      <button id="btn" onclick="runQuery()">Ask</button>
    </div>

    <div class="examples">
      <div class="chips" id="chips"></div>
    </div>

    <div id="status"></div>
    <div id="results"></div>
  </div>

  <!-- ── Entity browser sidebar ── -->
  <div class="sidebar">
    <div class="sidebar-header">Entities</div>
    <div class="sidebar-search">
      <input id="esearch" type="text" placeholder="filter…" oninput="filterEntities()" />
    </div>
    <div id="entity-list"><div class="empty" style="padding:20px;font-size:0.8rem">Loading…</div></div>
    <div class="entity-count" id="entity-count"></div>
  </div>
</div>

<script>
  // ── Example queries ──────────────────────────────────────────────────────
  const EXAMPLES = [
    "What does thu_bao work on?",
    "Who is thu_bao connected to?",
    "What teams is thu_bao a member of?",
  ];

  const chipsEl = document.getElementById("chips");
  EXAMPLES.forEach(ex => {
    const chip = document.createElement("span");
    chip.className = "chip";
    chip.textContent = ex;
    chip.onclick = () => { document.getElementById("q").value = ex; runQuery(); };
    chipsEl.appendChild(chip);
  });

  document.getElementById("q").addEventListener("keydown", e => {
    if (e.key === "Enter") runQuery();
  });

  // ── Entity browser ───────────────────────────────────────────────────────
  let allEntities = [];

  async function loadEntities() {
    try {
      const resp = await fetch("/entities");
      allEntities = await resp.json();
      renderEntities(allEntities);
    } catch (e) {
      document.getElementById("entity-list").innerHTML =
        `<div class="empty" style="padding:16px;font-size:0.78rem;color:#555">Failed to load entities</div>`;
    }
  }

  function filterEntities() {
    const q = document.getElementById("esearch").value.toLowerCase();
    const filtered = q
      ? allEntities.filter(e => e.name.toLowerCase().includes(q) || e.id.toLowerCase().includes(q))
      : allEntities;
    renderEntities(filtered);
  }

  function renderEntities(list) {
    const el = document.getElementById("entity-list");
    const countEl = document.getElementById("entity-count");
    if (list.length === 0) {
      el.innerHTML = `<div class="empty" style="padding:16px;font-size:0.78rem">No entities found</div>`;
      countEl.textContent = "";
      return;
    }
    el.innerHTML = list.map(e => `
      <div class="entity-row" onclick="useEntity('${esc(e.id)}')">
        <div class="ename">${esc(e.name)}</div>
        <div class="eid">${esc(e.id)} · ${esc(e.type)}</div>
      </div>
    `).join("");
    countEl.textContent = `${list.length} entit${list.length === 1 ? "y" : "ies"}`;
  }

  function useEntity(id) {
    const q = document.getElementById("q");
    q.value = `What do I know about ${id}?`;
    q.focus();
  }

  // ── Query ────────────────────────────────────────────────────────────────
  async function runQuery() {
    const q = document.getElementById("q").value.trim();
    if (!q) return;

    const btn = document.getElementById("btn");
    const statusEl = document.getElementById("status");
    const resultsEl = document.getElementById("results");

    btn.disabled = true;
    statusEl.className = "";
    statusEl.innerHTML = '<span class="spinner"></span>Querying graph…';
    resultsEl.innerHTML = "";

    let data;
    try {
      const resp = await fetch("/query", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question: q }),
      });
      // Read as text first so we can show the raw body on parse failure
      const text = await resp.text();
      try {
        data = JSON.parse(text);
      } catch (_) {
        statusEl.className = "error";
        statusEl.textContent = `Server returned non-JSON (status ${resp.status})`;
        resultsEl.innerHTML = `<details class="info-box"><summary>Raw server response</summary><pre>${esc(text)}</pre></details>`;
        btn.disabled = false;
        return;
      }
    } catch (err) {
      statusEl.className = "error";
      statusEl.textContent = "Network error: " + err.message;
      btn.disabled = false;
      return;
    }

    btn.disabled = false;

    if (data.error) {
      statusEl.className = "error";
      statusEl.textContent = "Error: " + data.error;

      // Show suggestions if the entity wasn't found
      if (data.debug?.suggestions?.length) {
        const box = document.createElement("div");
        box.className = "info-box";
        box.innerHTML = `<div class="suggestions">
          <p>Entities that match your term — click to use:</p>
          ${data.debug.suggestions.map(s =>
            `<span class="sug-chip" onclick="useEntity('${esc(s.id)}')">${esc(s.id)} <span style="opacity:.5">(${esc(s.name)})</span></span>`
          ).join("")}
        </div>`;
        resultsEl.appendChild(box);
      }

      // Always show full debug/traceback
      if (data.debug) renderDebug(resultsEl, data.debug);
      return;
    }

    const count = data.results.length;
    statusEl.textContent = count === 0
      ? "No matching edges found."
      : `${count} edge${count !== 1 ? "s" : ""} found`;

    if (count === 0) {
      resultsEl.innerHTML = '<div class="empty">No results — check entity names or ingest more data.</div>';
      if (data.debug) renderDebug(resultsEl, data.debug);
      return;
    }

    if (data.answer) {
      const box = document.createElement("div");
      box.className = "answer-box";
      box.innerHTML = `<div class="answer-label">Answer</div>${esc(data.answer)}`;
      resultsEl.appendChild(box);
    }

    data.results.forEach(e => {
      const card = document.createElement("div");
      card.className = "edge-card";
      card.innerHTML = `
        <div class="fact">${esc(e.fact)}</div>
        <div class="meta">
          <span class="tag entity" title="click to query" style="cursor:pointer"
                onclick="useEntity('${esc(e.source)}')">${esc(e.source)}</span>
          <span class="tag relation">${esc(e.relation)}</span>
          <span class="tag entity" title="click to query" style="cursor:pointer"
                onclick="useEntity('${esc(e.target)}')">${esc(e.target)}</span>
          <span class="tag score">score ${e.score}</span>
        </div>
        <div class="dates">
          from ${e.valid_from ? e.valid_from.slice(0,10) : "?"}
          ${e.valid_until ? " · until " + e.valid_until.slice(0,10) : ""}
          · confidence ${e.confidence}
        </div>
      `;
      resultsEl.appendChild(card);
    });
  }

  function renderDebug(container, obj) {
    const box = document.createElement("details");
    box.className = "info-box";
    box.innerHTML = `<summary>Debug info</summary><pre>${esc(JSON.stringify(obj, null, 2))}</pre>`;
    container.appendChild(box);
  }

  function esc(s) {
    return String(s ?? "")
      .replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  // Load entities on page load
  loadEntities();
</script>

</body>
</html>
